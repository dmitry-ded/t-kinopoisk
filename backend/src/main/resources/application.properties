spring.application.name=t-kinopoisk

server.port=${PORT:8080}
server.forward-headers-strategy=framework

jwt.secret=${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/t-kinopoisk}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kinopoisk}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
